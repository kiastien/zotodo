<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })">
  <caption data-l10n-id="zotodo-todoist-settings" />

  <hbox>
    <label id="id-zotodo-todoist-token-label" control="id-zotodo-todoist-token" data-l10n-id="zotodo-todoist-token" />
    <html:input id="id-zotodo-todoist-token" preference="todoist_token" type="password"></html:input>
  </hbox>

  <hbox>
    <label id="id-zotodo-project-label" control="id-zotodo-project" data-l10n-id="zotodo-project" />
    <html:input id="id-zotodo-project" preference="project" type="text"></html:input>
  </hbox>

  <hbox>
    <label id="id-zotodo-section-label" control="id-zotodo-section" data-l10n-id="zotodo-section" />
    <html:input id="id-zotodo-section" preference="section" type="text"></html:input>
  </hbox>

  <checkbox
    id="id-zotodo-set-due"
    preference="set_due"
    data-l10n-id="zotodo-set-due"
    oncommand="Zotero.__addonInstance__.hooks.onPrefsEvent('change', { window })"
  />

  <hbox>
    <label id="id-zotodo-due-string-label" control="id-zotodo-due-string" data-l10n-id="zotodo-due-string" />
    <html:input id="id-zotodo-due-string" preference="due_string" type="text"></html:input>
  </hbox>

  <hbox>
    <label id="id-zotodo-labels-label" control="id-zotodo-labels" data-l10n-id="zotodo-labels" />
    <html:input id="id-zotodo-labels" preference="labels" type="text"></html:input>
  </hbox>

  <hbox>
    <label id="id-zotodo-priority-label" control="id-zotodo-priority" data-l10n-id="zotodo-priority" />
    <html:input id="id-zotodo-priority" preference="priority" type="number" min="1" max="4" step="1"></html:input>
  </hbox>
</groupbox>

<groupbox>
  <caption data-l10n-id="zotodo-zotero-settings" />

  <hbox>
    <label id="id-zotodo-task-format-label" control="id-zotodo-task-format" data-l10n-id="zotodo-task-format" />
    <html:input id="id-zotodo-task-format" preference="task_format" type="text"></html:input>
  </hbox>
  <label id="id-zotodo-task-format-wildcards" style="font-size: 10px" data-l10n-id="zotodo-list-of-wildcards" />

  <checkbox
    id="id-zotodo-include-note"
    preference="include_note"
    data-l10n-id="zotodo-include-note"
    oncommand="Zotero.__addonInstance__.hooks.onPrefsEvent('change', { window })"
  />

  <hbox>
    <label id="id-zotodo-note-format-label" control="id-zotodo-note-format" data-l10n-id="zotodo-note-format" />
    <html:input id="id-zotodo-note-format" preference="note_format" type="text"></html:input>
  </hbox>
  <label id="id-zotodo-note-format-wildcards" style="font-size: 10px" data-l10n-id="zotodo-list-of-wildcards" />

  <checkbox
    id="id-zotodo-automatic-add"
    preference="automatic_add"
    data-l10n-id="zotodo-automatic-add"
  />

  <hbox>
    <label id="id-zotodo-ignore-collections-label" control="id-zotodo-ignore-collections" data-l10n-id="zotodo-ignore-collections" />
    <html:input id="id-zotodo-ignore-collections" preference="ignore_collections" type="text"></html:input>
  </hbox>
</groupbox>
